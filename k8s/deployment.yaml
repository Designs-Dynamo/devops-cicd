apiVersion: apps/v1
kind: Deployment

metadata:
  name: kr-frontend
  namespace: react-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: kr-frontend

  template:
    metadata:
      labels:
        app: kr-frontend

    spec:
      containers:
        - name: kr-frontend
          image: designdynamo/kr-am-frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: kr-frontend-service
  namespace: react-app

spec:
  type: NodePort

  selector:
    app: kr-frontend

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080