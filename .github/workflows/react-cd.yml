name: React CD Pipeline

on:
  workflow_run:
    workflows: ["React CI"]   # Must exactly match your CI workflow name
    types:
      - completed

jobs:
  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Runner
        run: |
          echo "Running on:"
          hostname
          whoami

      - name: Verify Kubernetes Cluster
        run: |
          kubectl get nodes
          kubectl get ns

      - name: Create Namespace
        run: |
          kubectl create namespace react-app \
          --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Kubernetes Resources
        run: |
          kubectl apply -f k8s/deployment.yaml


      - name: Update Deployment Image
        run: |
          kubectl set image deployment/kr-frontend \
          kr-frontend=designdynamo/kr-am-frontend:${{ github.event.workflow_run.head_sha }} \
          -n react-app

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/kr-frontend \
          -n react-app \
          --timeout=300s

      - name: Verify Deployment
        run: |
          echo "========== Deployments =========="
          kubectl get deployment -n react-app

          echo ""
          echo "========== Pods =========="
          kubectl get pods -n react-app -o wide

          echo ""
          echo "========== Service =========="
          kubectl get svc -n react-app

          echo ""
          echo "========== Ingress =========="
          kubectl get ingress -n react-app || true

      - name: Rollback if Failed
        if: failure()
        run: |
          echo "Deployment Failed..."
          kubectl rollout undo deployment/kr-frontend -n react-app

      - name: Deployment Successful
        if: success()
        run: |
          echo "========================================="
          echo " React Application Deployed Successfully "
          echo "========================================="